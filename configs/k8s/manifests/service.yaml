---
apiVersion: v1
kind: Service
metadata:
  name: mpc-node
  namespace: mpc-custody
spec:
  clusterIP: None
  ports:
  - port: 7001
    name: node
  - port: 7002
    name: enclave
  selector:
    app: mpc-node
---
apiVersion: v1
kind: Service
metadata:
  name: mpc-node-lb
  namespace: mpc-custody
spec:
  type: LoadBalancer
  ports:
  - port: 7001
    targetPort: 7001
    name: node
  selector:
    app: mpc-node
